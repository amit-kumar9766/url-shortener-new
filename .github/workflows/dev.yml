name: Pushing to main branch

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main 

permissions:
      contents: read
      pull-requests: write

jobs:
  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (lockfile)
        run: npm ci

      - name: Dependency security audit
        run: npm audit --audit-level=moderate

  job1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache NPM dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-cache

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest
      - name: install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - run: npm run build --if-present
      - name: test
        run: npm run test --if-present
      - name: coverage
        run: npx jest --coverage
      - uses: kcjpop/coverage-comments@v2.2
        if: github.event_name == 'pull_request' 
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-file: "coverage/lcov.info"

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-type: application/json" \
            -d '{
              "text": "Build failed\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nAuthor: ${{ github.actor }}\nCommit: ${{ github.sha }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

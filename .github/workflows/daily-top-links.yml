name: Daily Top Links

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Query top links and post to Slack
        run: |
          REPORT=$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -t -A <<'SQL'
          SELECT format('%s - %s shortenings', "originalUrl", count(*)::text)
          FROM "Urls"
          WHERE "createdAt" >= NOW() - INTERVAL '24 hours'
            AND "deletedAt" IS NULL
          GROUP BY "originalUrl"
          ORDER BY count(*) DESC
          LIMIT 10;
          SQL
          )
          TEXT="Top links (24h)\n${REPORT}"
          python3 - "$SLACK_WEBHOOK_URL" "$TEXT" <<'PY'
          import json, sys, urllib.request
          url, text = sys.argv[1], sys.argv[2]
          body = json.dumps({"text": text}).encode()
          req = urllib.request.Request(
              url,
              data=body,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(req)
          PY